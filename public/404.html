<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <title>Demokratisches Hacker Kollektiv - Seite nicht gefunden</title>
    <script type="text/javascript">
      // Permanently redirect to the homepage while preserving the path
      // This allows React Router to handle the routing
      var segmentCount = 0;
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + segmentCount).join("/") + "/demokratisches-hacker-kollektiv.github.io/" +
        l.pathname.slice(1).split("/").slice(segmentCount).join("/") +
        (l.search ? l.search : "") +
        (l.hash ? l.hash : "")
      );
    </script>
  </head>
  <body>
    <h1>Redirecting...</h1>
    <p>If you are not redirected automatically, please <a href="/demokratisches-hacker-kollektiv.github.io/">click here</a>.</p>
  </body>
</html>
